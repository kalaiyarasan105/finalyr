services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: emotiAI-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./emotion_app.db
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
    disk:
      name: emotiAI-data
      mountPath: /opt/render/project/src
      sizeGB: 1

  # ── Frontend (React) ───────────────────────────────────────────────────────
  - type: web
    name: emotiAI-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: emotiAI-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
